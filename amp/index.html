<!doctype html>
<html ⚡ lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1" />
        <title>Lapak Game Termurah Top Up Game Pakai Pulsa: Isi Diamond ML, FF & Robux Murah 24 Jam</title>
        <meta name="description" content="Lapak Game termurah untuk top up ML, FF, & Robux 24 jam! Proses kilat, aman, dan bisa bayar pakai pulsa. Yuk, isi saldo game favoritmu sekarang!" />
        <link rel="canonical" href="https://www.kitcampus.com/home/" />
        <link rel="icon" href="https://res.cloudinary.com/dpxurstiv/image/upload/v1782702641/6b517168-4b13-4113-874e-5d1a952fea6c_d6haiw.png" />
        
        <!-- AMP Script Wajib -->
        <script async src="https://cdn.ampproject.org/v0.js"></script>
        
        <!-- AMP Components -->
        <script async custom-element="amp-bind" src="https://cdn.ampproject.org/v0/amp-bind-0.1.js"></script>

        <style amp-custom>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                box-sizing: border-box;
                margin: 0;
                font-family:
                    system-ui,
                    -apple-system,
                    Segoe UI,
                    Roboto,
                    sans-serif;
                color: #cbcbcb;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                width: 100%;
                padding: 20px;
                background-image:
                    repeating-linear-gradient(
                        90deg,
                        rgba(75, 75, 75, 0.09) 0px,
                        rgba(75, 75, 75, 0.09) 1px,
                        transparent 1px,
                        transparent 60px
                    ),
                    repeating-linear-gradient(
                        0deg,
                        rgba(75, 75, 75, 0.09) 0px,
                        rgba(75, 75, 75, 0.09) 1px,
                        transparent 1px,
                        transparent 60px
                    ),
                    repeating-linear-gradient(
                        0deg,
                        rgba(75, 75, 75, 0.09) 0px,
                        rgba(75, 75, 75, 0.09) 1px,
                        transparent 1px,
                        transparent 10px
                    ),
                    repeating-linear-gradient(
                        90deg,
                        rgba(75, 75, 75, 0.09) 0px,
                        rgba(75, 75, 75, 0.09) 1px,
                        transparent 1px,
                        transparent 10px
                    ),
                    linear-gradient(90deg, rgb(0, 0, 0), rgb(0, 0, 0));
            }

            .card {
                width: 100%;
                padding: 36px;
                max-width: 500px;
                text-align: center;
            }

            .logos {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin: 28px 0 48px 0;
            }

            .logo-old {
                width: 80px;
                opacity: 0.7;
            }

            .logo-new {
                width: 140px;
            }

            /* animated chevrons */
            .chevrons {
                display: flex;
                gap: 4px;
            }

            .chevrons span {
                width: 10px;
                height: 10px;
                border-right: 3px solid #d4af37;
                border-bottom: 3px solid #d4af37;
                transform: rotate(-45deg);
                opacity: 0;
                animation: move 1.4s infinite;
            }

            .chevrons span:nth-child(2) {
                animation-delay: 0.2s;
            }

            .chevrons span:nth-child(3) {
                animation-delay: 0.4s;
            }

            @keyframes move {
                0% {
                    opacity: 0;
                    transform: translateX(-6px) rotate(-45deg);
                }
                50% {
                    opacity: 1;
                }
                100% {
                    opacity: 0;
                    transform: translateX(6px) rotate(-45deg);
                }
            }

            h1 {
                font-size: 22px;
                color: #fff;
            }

            p {
                font-size: 16px;
                color: #cdcdcd;
                margin-bottom: 4px;
            }

            .url {
                color: #d4af37;
                font-weight: 600;
                margin: 10px 0px 40px 0px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                flex-wrap: wrap;
            }

            .btn {
                display: inline-block;
                width: 100%;
                padding: 14px;
                border-radius: 10px;
                font-size: 15px;
                font-weight: 600;
                text-decoration: none;
                margin-bottom: 10px;
                text-align: center;
                border: none;
                cursor: pointer;
            }

            .btn-main {
                background: #d4af37;
                color: #000;
            }

            .btn-main:hover {
                background: #c4a030;
            }

            .btn-whatsapp {
                border: 1px solid #363636;
                color: #969696;
                background: transparent;
            }

            .btn-whatsapp:hover {
                border-color: #25d366;
                color: #25d366;
            }

            .footer {
                margin-top: 18px;
                font-size: 13px;
                color: #727273;
            }

            .url-text {
                word-break: break-all;
            }

            .btn-copy {
                padding: 6px 14px;
                border-radius: 6px;
                border: 1px solid #d4af37;
                background: transparent;
                color: #d4af37;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
                display: inline-flex;
                align-items: center;
                gap: 4px;
                font-family: inherit;
            }

            .btn-copy:hover {
                background: #d4af37;
                color: #000;
            }

            amp-img {
                max-width: 100%;
                height: auto;
            }

            a {
                text-decoration: none;
            }

            .btn:focus-visible,
            .btn-copy:focus-visible {
                outline: 2px solid #d4af37;
                outline-offset: 2px;
            }

            .copy-success {
                color: #10b981;
                font-size: 14px;
                margin-top: 5px;
            }

            .copy-success[hidden] {
                display: none;
            }
        </style>

        <style amp-boilerplate>
            body {
                -webkit-animation: -amp-start 8s steps(1,end) 0s 1 normal both;
                -moz-animation: -amp-start 8s steps(1,end) 0s 1 normal both;
                -ms-animation: -amp-start 8s steps(1,end) 0s 1 normal both;
                animation: -amp-start 8s steps(1,end) 0s 1 normal both;
            }
            @-webkit-keyframes -amp-start {
                from {
                    visibility: hidden;
                }
                to {
                    visibility: visible;
                }
            }
            @-moz-keyframes -amp-start {
                from {
                    visibility: hidden;
                }
                to {
                    visibility: visible;
                }
            }
            @-ms-keyframes -amp-start {
                from {
                    visibility: hidden;
                }
                to {
                    visibility: visible;
                }
            }
            @-o-keyframes -amp-start {
                from {
                    visibility: hidden;
                }
                to {
                    visibility: visible;
                }
            }
            @keyframes -amp-start {
                from {
                    visibility: hidden;
                }
                to {
                    visibility: visible;
                }
            }
        </style>
        <noscript>
            <style amp-boilerplate>
                body {
                    -webkit-animation: none;
                    -moz-animation: none;
                    -ms-animation: none;
                    animation: none;
                }
            </style>
        </noscript>
    </head>

    <body>
        <div class="card">
            <h1>Lapak Game Termurah Top Up Game Pakai Pulsa: Isi Diamond ML, FF & Robux Murah 24 Jam</h1>

            <!-- LOGOS ROW -->
            <div class="logos">
                <amp-img
                    src="https://res.cloudinary.com/dpxurstiv/image/upload/v1782702641/6b517168-4b13-4113-874e-5d1a952fea6c_d6haiw.png"
                    alt="Logo Lama"
                    class="logo-old"
                    width="80"
                    height="80"
                    layout="fixed"
                ></amp-img>

                <div class="chevrons">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <amp-img
                    src="https://res.cloudinary.com/dpxurstiv/image/upload/v1783565970/efa1b0aa-11e2-4e5b-90a7-9050842a5cef-removebg-preview_iicof5.png"
                    alt="Logo Baru - LAPAK TOP UP GAME"
                    class="logo-new"
                    width="140"
                    height="80"
                    layout="fixed"
                ></amp-img>
            </div>

            <p>Gunakan website baru kami mulai sekarang</p>

            <div class="url">
                <span class="url-text">ezetopup.com</span>
                
                <!-- AMP Copy Button dengan amp-bind -->
                <button 
                    class="btn-copy"
                    on="tap:AMP.setState({ copied: true, buttonText: '✅ Tersalin!' })"
                    [text]="buttonText || '📋 Salin'"
                >
                    📋 Salin
                </button>
                <div class="copy-success" [hidden]="!copied">
                    ✅ Link berhasil disalin!
                </div>
            </div>

            <a href="https://ezetopup.com/" class="btn btn-main">
                Kunjungi Website Baru
            </a>

            <a
                href="https://wa.me/628116796622"
                target="_blank"
                class="btn btn-whatsapp"
            >
                Hubungi Support via WhatsApp
            </a>

            <div class="footer">Terima kasih atas kepercayaan dan dukungannya ❤️</div>
        </div>

        <!-- AMP State -->
        <amp-state id="copied">
            <script type="application/json">
                false
            </script>
        </amp-state>
        
        <amp-state id="buttonText">
            <script type="application/json">
                "📋 Salin"
            </script>
        </amp-state>
    </body>
</html>
